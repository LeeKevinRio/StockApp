# 自動建置 Flutter Web 並部署到 GitHub Pages
name: Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: taiwan_stock_app/frontend
        run: flutter pub get

      - name: Build Web
        working-directory: taiwan_stock_app/frontend
        run: |
          flutter build web --release \
            --base-href=/StockApp/ \
            --dart-define=API_BASE_URL=https://stockapp-backend-ein8.onrender.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: taiwan_stock_app/frontend/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
