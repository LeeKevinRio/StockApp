name: taiwan_stock_app
description: 台股 AI 投資建議 APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 狀態管理
  provider: ^6.1.1

  # 網路請求
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # 本地儲存
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI 元件
  intl: ^0.20.2
  fl_chart: ^0.69.0
  url_launcher: ^6.2.4
  shimmer: ^3.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # 推播通知
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/icons/Icon-512.png"
  adaptive_icon_background: "#1a73e8"
  adaptive_icon_foreground: "web/icons/Icon-512.png"

flutter:
  uses-material-design: true
