<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- 允許 Google Sign-In popup 跨域通訊 -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  <meta name="description" content="台股智慧助手 — AI 驅動的台灣股票分析與投資組合管理工具">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="台股智慧助手">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>台股智慧助手</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In: 僅在 localhost 或正式域名時啟用 -->
  <script>
    (function() {
      var host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1' || host.endsWith('.com') || host.endsWith('.app') || host.endsWith('.io')) {
        var meta = document.createElement('meta');
        meta.name = 'google-signin-client_id';
        meta.content = '506193160322-omn6g1hja95mv192ajdu0ospgndohh6o.apps.googleusercontent.com';
        document.head.appendChild(meta);
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
