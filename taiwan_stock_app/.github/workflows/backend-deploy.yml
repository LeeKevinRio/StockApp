name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'taiwan_stock_app/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'taiwan_stock_app/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taiwan_stock_app/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: taiwan_stock_app/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: test-secret-for-ci
          ENVIRONMENT: development

  # Railway 自動部署由 Railway 平台的 GitHub 整合觸發
  # 設定方式: Railway Dashboard → 連接 GitHub repo → 選擇 backend 目錄
