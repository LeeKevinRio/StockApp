[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 改用 strict 模式：避開 pytest-asyncio 0.23 在 auto 模式下對 Package collector
# 註入 attribute 失敗的 collection error。專案目前沒有 async 測試，所以
# strict 模式不影響任何用例。若未來新增 async 測試需在函式上加
# @pytest.mark.asyncio。
asyncio_mode = strict
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
